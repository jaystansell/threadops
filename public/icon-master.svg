<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0A0F1A"/>

  <!-- Subtle radial glow behind stickman -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="240" r="200" fill="url(#glow)"/>

  <!-- Speech bubble (thread) - teal, positioned upper-right -->
  <rect x="260" y="80" width="180" height="130" rx="24" ry="24" fill="#14B8A6"/>
  <!-- Bubble tail pointing to stickman -->
  <polygon points="280,210 260,240 310,210" fill="#14B8A6"/>

  <!-- Thread lines inside bubble -->
  <line x1="290" y1="120" x2="410" y2="120" stroke="#0A0F1A" stroke-width="10" stroke-linecap="round"/>
  <line x1="290" y1="148" x2="390" y2="148" stroke="#0A0F1A" stroke-width="10" stroke-linecap="round"/>
  <line x1="290" y1="176" x2="370" y2="176" stroke="#0A0F1A" stroke-width="10" stroke-linecap="round"/>

  <!-- Stickman figure - white, playful pose -->
  <!-- Head -->
  <circle cx="180" cy="200" r="42" fill="none" stroke="#F1F5F9" stroke-width="14"/>
  <!-- Eyes (playful dots) -->
  <circle cx="166" cy="192" r="6" fill="#F1F5F9"/>
  <circle cx="194" cy="192" r="6" fill="#F1F5F9"/>
  <!-- Smile -->
  <path d="M166,208 Q180,224 194,208" fill="none" stroke="#F1F5F9" stroke-width="5" stroke-linecap="round"/>

  <!-- Body -->
  <line x1="180" y1="242" x2="180" y2="340" stroke="#F1F5F9" stroke-width="14" stroke-linecap="round"/>

  <!-- Left arm - waving up -->
  <path d="M180,275 L130,230 L110,190" fill="none" stroke="#F1F5F9" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm - pointing at bubble -->
  <path d="M180,280 L240,250" fill="none" stroke="#F1F5F9" stroke-width="14" stroke-linecap="round"/>

  <!-- Left leg -->
  <line x1="180" y1="340" x2="140" y2="420" stroke="#F1F5F9" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="180" y1="340" x2="220" y2="420" stroke="#F1F5F9" stroke-width="14" stroke-linecap="round"/>

  <!-- Small thread dots connecting stickman to bubble (conversation flow) -->
  <circle cx="248" cy="242" r="5" fill="#14B8A6" opacity="0.7"/>
  <circle cx="258" cy="230" r="4" fill="#14B8A6" opacity="0.5"/>
</svg>
